<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Klon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <a href="#">Gmail</a>
            <a href="#">Görseller</a>
            <button class="signin-btn">Oturum açın</button>
        </nav>
    </header>

    <main>
        <section class="search-container">
            <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="Google Logo" class="logo">
            
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input">
                <span class="mic-icon">🎤</span>
            </div>

            <div class="buttons">
                <button>Google'da Ara</button>
                <button>Kendimi Şanslı Hissediyorum</button>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-top">Türkiye</div>
        <div class="footer-bottom">
            <div class="footer-left">
                <a href="#">Hakkında</a>
                <a href="#">Reklam</a>
                <a href="#">İşletme</a>
                <a href="#">Arama nasıl çalışır?</a>
            </div>
            <div class="footer-right">
                <a href="#">Gizlilik</a>
                <a href="#">Şartlar</a>
                <a href="#">Ayarlar</a>
            </div>
        </div>
    </footer>
</body>
</html>
