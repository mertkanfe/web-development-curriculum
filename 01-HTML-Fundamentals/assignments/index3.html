Kullanılması Zorunlu HTML Etiketleri

Yapısal Etiketler: <!DOCTYPE html>, <html>, <head>, <body>, <meta charset="UTF-8">

Listeler: <ul> (Malzemeler için sırasız liste), <ol> (Hazırlanış için sıralı liste)
Vurgu: <strong> (Kalın yazı) veya <em> (İtalik yazı)
Medya ve Link: <img> (Yemek fotoğrafı), <a> (Kaynak siteye giden bağlantı)
